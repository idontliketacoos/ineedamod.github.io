<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VenHub V8.2 | Securly's End</title>
    <style>
        :root { 
            --main: #000000; 
            --bg: #ffffff; 
            --purple: #bc13fe; 
            --gold: #d4af37;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(rgba(0,0,0,0.1) 2px, transparent 0);
            background-size: 24px 24px;
            color: var(--main); 
            font-family: 'Times New Roman', serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* --- REAL SHIELD LOGO --- */
        .header-logo {
            margin-top: 40px; position: relative; width: 120px; height: 140px;
            perspective: 1000px;
        }
        .shield-real {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(145deg, #222, #000);
            clip-path: polygon(50% 0%, 100% 20%, 100% 70%, 50% 100%, 0% 70%, 0% 20%);
            border: 4px solid var(--purple);
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.4);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .shield-real:hover { transform: rotateY(180deg) scale(1.1); }
        .v-text { 
            font-size: 80px; font-weight: 900; color: var(--purple); 
            text-shadow: 0 0 15px var(--purple); font-family: 'Arial Black', sans-serif;
        }

        header { 
            text-align: center; margin-bottom: 20px; padding: 25px; 
            border-bottom: 8px double #000; width: 100%; background: #fff; z-index: 5; 
        }
        h1 { font-size: 48px; letter-spacing: 15px; margin: 0; text-transform: uppercase; font-weight: 900; }
        .slogan { font-style: italic; font-size: 16px; margin-top: 5px; color: #444; letter-spacing: 2px; }

        /* --- MANUAL UPLINK INJECTOR --- */
        .injector-panel {
            width: 90%; max-width: 800px; background: #fff; border: 3px solid #000;
            padding: 20px; margin: 20px 0; box-shadow: 8px 8px 0px #000;
            display: flex; flex-direction: column; gap: 15px;
        }
        .injector-row { display: flex; gap: 10px; }
        .injector-row input { 
            flex: 1; padding: 12px; border: 2px solid #000; font-family: monospace; 
            outline: none; font-size: 14px;
        }
        .inject-btn { 
            background: #000; color: #fff; border: none; padding: 10px 30px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .inject-btn:hover { background: var(--purple); box-shadow: 0 0 15px var(--purple); }

        .container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; width: 90%; max-width: 1200px; z-index: 5; margin-top: 20px;
            padding-bottom: 120px;
        }
        
        .button { 
            background: #fff; border: 3px solid #000; padding: 25px; 
            text-align: center; text-decoration: none; color: #000;
            font-weight: bold; transition: 0.3s; position: relative;
            box-shadow: 8px 8px 0px #000;
        }
        .button:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px var(--purple); background: #fdfdfd; }
        .desc { display: block; font-size: 10px; font-weight: normal; margin-top: 8px; opacity: 0.6; letter-spacing: 1px; }

        .section-title { width: 90%; margin: 40px 0 20px; font-size: 26px; font-weight: 900; border-bottom: 4px solid #000; padding-bottom: 5px; }

        /* --- ACTUAL KATANA ART --- */
        .katana-svg {
            position: fixed; bottom: -10px; width: 450px; height: auto;
            pointer-events: none; z-index: 10; opacity: 0.8; filter: drop-shadow(0 0 5px #000);
        }

        .panic { 
            position: fixed; bottom: 30px; left: 30px; background: #000; color: #fff; 
            padding: 12px 30px; font-weight: bold; border: none; cursor: pointer; 
            z-index: 100; font-size: 14px; box-shadow: 5px 5px 0px var(--purple);
        }
        .panic:hover { background: var(--purple); }

        .del-btn { color: red; font-size: 9px; cursor: pointer; margin-top: 10px; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-logo">
        <div class="shield-real">
            <div class="v-text">V</div>
        </div>
    </div>

    <header>
        <h1>VENHUB V8.2</h1>
        <div class="slogan">"where securly comes to die."</div>
    </header>

    <!-- INJECTOR PANEL -->
    <div class="injector-panel">
        <div style="font-weight: bold; letter-spacing: 2px;">[ MANUAL_NODE_INJECTION_V1 ]</div>
        <div class="injector-row">
            <input type="text" id="nodeName" placeholder="NODE_IDENTIFIER (e.g. YouTube)">
            <input type="text" id="nodeUrl" placeholder="TARGET_UPLINK (https://...)">
            <button class="inject-btn" onclick="saveNode()">INJECT</button>
        </div>
    </div>

    <div class="section-title">CORE_SYSTEM_UPLINKS</div>
    <div class="container" id="mainGrid">
        <a href="page2.html" class="button" style="border-color: var(--purple); box-shadow: 8px 8px 0 var(--purple);">
            🎬 ENTER_MEDIA_VAULT
            <span class="desc">GOLDEN_AGE_1999_ACCESS // RESTR_BYPASS</span>
        </a>
        <a href="https://edpuzzle.cv" target="_blank" class="button">
            EDPUZZLE_CV
            <span class="desc">EDUCATION_MIRROR // STEALTH_ACTIVE</span>
        </a>
        <a href="http://ChristianPrince.bostoncareercounselor.com" target="_blank" class="button">
            CHRISTIAN_PRINCE
            <span class="desc">STEALTH_UPLINK_8080</span>
        </a>
    </div>

    <!-- ACTUAL KATANA ART (SVG) -->
    <!-- Left Katana -->
    <svg class="katana-svg" style="left: -50px; transform: rotate(15deg);" viewBox="0 0 800 200">
        <path d="M50 150 L750 145 Q770 145 780 130 L785 125" stroke="black" stroke-width="8" fill="none" />
        <rect x="50" y="135" width="100" height="30" fill="#333" rx="5" /> <!-- Handle -->
        <circle cx="150" cy="150" r="15" fill="black" /> <!-- Guard -->
        <path d="M150 148 L750 143" stroke="#ccc" stroke-width="4" /> <!-- Blade edge -->
    </svg>

    <!-- Right Katana -->
    <svg class="katana-svg" style="right: -50px; transform: scaleX(-1) rotate(15deg);" viewBox="0 0 800 200">
        <path d="M50 150 L750 145 Q770 145 780 130 L785 125" stroke="black" stroke-width="8" fill="none" />
        <rect x="50" y="135" width="100" height="30" fill="#333" rx="5" />
        <circle cx="150" cy="150" r="15" fill="black" />
        <path d="M150 148 L750 143" stroke="#ccc" stroke-width="4" />
    </svg>

    <div class="panic" onclick="window.location.replace('https://classroom.google.com')">EXIT_COMBAT (Q)</div>

    <script>
        // LOAD CUSTOM NODES
        window.onload = renderNodes;

        function saveNode() {
            const name = document.getElementById('nodeName').value;
            const url = document.getElementById('nodeUrl').value;
            if (!name || !url) return alert("ERROR: DATA_MISSING");

            let nodes = JSON.parse(localStorage.getItem('ven_nodes')) || [];
            nodes.push({ name, url });
            localStorage.setItem('ven_nodes', JSON.stringify(nodes));
            
            document.getElementById('nodeName').value = '';
            document.getElementById('nodeUrl').value = '';
            location.reload();
        }

        function renderNodes() {
            const grid = document.getElementById('mainGrid');
            let nodes = JSON.parse(localStorage.getItem('ven_nodes')) || [];
            
            nodes.forEach((node, i) => {
                grid.innerHTML += `
                    <div class="button" style="border-style: dashed;">
                        <a href="${node.url}" target="_blank" style="text-decoration:none; color:black;">
                            ${node.name.toUpperCase()}
                            <span class="desc">USER_DEFINED // UPLINK_${1000+i}</span>
                        </a>
                        <div class="del-btn" onclick="deleteNode(${i})">[ DELETE_NODE ]</div>
                    </div>
                `;
            });
        }

        function deleteNode(i) {
            let nodes = JSON.parse(localStorage.getItem('ven_nodes'));
            nodes.splice(i, 1);
            localStorage.setItem('ven_nodes', JSON.stringify(nodes));
            location.reload();
        }

        // PANIC KEY Q
        window.addEventListener('keydown', e => { 
            if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); 
        });
    </script>
</body>
</html>
