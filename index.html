<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vens Hub | Overworld</title>
    <style>
        :root { 
            --grass: #5da832; 
            --dirt: #795548;
            --sky: #87ceeb; 
            --wood: #a1887f;
            --font-main: 'Trebuchet MS', sans-serif;
        }
        
        body {
            background-color: var(--sky);
            background-image: linear-gradient(to bottom, #87ceeb 0%, #e0f7fa 100%);
            color: #ffffff;
            font-family: var(--font-main);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        header { 
            background: var(--dirt);
            border: 4px solid #3d2b1f;
            border-bottom: 8px solid #3d2b1f;
            padding: 20px; width: 85%;
            text-align: center; margin-bottom: 30px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }
        
        h1 { 
            margin: 0; font-size: 32px; text-transform: uppercase; 
            letter-spacing: 2px; text-shadow: 3px 3px 0px #3d2b1f;
        }

        .gatekeep-note { color: #ffeb3b; font-size: 12px; margin-top: 5px; font-weight: bold; font-style: italic; }

        .panic-bar { 
            background: #ff4444; border: 4px solid #880000;
            color: white; font-weight: bold; font-size: 14px;
            margin-bottom: 30px; padding: 12px; width: 80%;
            text-align: center; cursor: pointer; box-shadow: 0 5px 0 #880000;
            transition: 0.2s;
        }
        .panic-bar:hover { background: #ff5555; }
        .panic-bar:active { transform: translateY(4px); box-shadow: 0 1px 0 #880000; }
        
        .section-title { 
            background: var(--grass); border: 3px solid #2e5419;
            padding: 10px 25px; margin: 20px 0; font-size: 18px;
            box-shadow: 4px 4px 0px #2e5419;
        }

        .hub-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; width: 95%; max-width: 1200px; 
        }

        .button { 
            background: #bdbdbd; border: 4px solid #424242;
            height: 110px; transition: 0.2s; position: relative;
            box-shadow: 0 6px 0 #424242;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none;
        }
        
        .button:hover { background: #e0e0e0; transform: translateY(-2px); box-shadow: 0 8px 0 #424242; }
        .button:active { transform: translateY(4px); box-shadow: 0 2px 0 #424242; }

        .button-text { 
            color: #212121; font-weight: bold; text-align: center;
            display: flex; flex-direction: column;
        }

        .desc { font-size: 11px; color: #616161; margin-top: 8px; font-weight: normal; }

        .page-nav-wrapper { margin-top: 60px; display: flex; gap: 20px; }
        .page-nav { 
            background: var(--wood); border: 4px solid #5d4037;
            padding: 15px 40px; color: white; text-decoration: none; font-weight: bold;
            box-shadow: 0 6px 0 #5d4037; transition: 0.2s;
        }
        .page-nav:hover { background: #d7ccc8; color: #5d4037; transform: translateY(-2px); }
    </style>
</head>
<body>
    <header>
        <h1>VENS_HUB_V6: SOUL</h1>
        <div class="gatekeep-note">btw gatekeep ts pls</div>
    </header>

    <div class="panic-bar" onclick="window.location.replace('https://classroom.google.com')">
        [!] EMERGENCY ESCAPE: PRESS "Q" [!]
    </div>

    <div class="section-title">LOOT_TABLE: 2026_PROXIES</div>
    
    <div class="hub-container">
        <!-- TIKTOK SCRAPED PROXIES -->
        <a href="https://universal.v6.rocks" target="_blank" class="button">
            <div class="button-text">UNIVERSAL_PROXY<span class="desc">High-speed stealth unblocker</span></div>
        </a>
        <a href="https://void.v6.rocks" target="_blank" class="button">
            <div class="button-text">VOID_NETWORK<span class="desc">2026 ultra-stable node</span></a>
        </a>
        <a href="https://nebula.psw.edu.pl" target="_blank" class="button">
            <div class="button-text">NEBULA_V6<span class="desc">Ultraviolet-powered mirror</span></div>
        </a>
        <a href="https://interstellar-proxy.io" target="_blank" class="button">
            <div class="button-text">INTERSTELLAR<span class="desc">Low-latency school bypass</span></div>
        </a>
    </div>

    <div class="page-nav-wrapper">
        <a href="page2.html" class="page-nav">MEDIA_CHEST</a>
        <a href="page3.html" class="page-nav">GAME_TERMINAL</a>
        <a href="page4.html" class="page-nav">VENBOT_AI</a>
    </div>

    <script>
        // Global Panic Key
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com');
        });
    </script>
</body>
        </html>
