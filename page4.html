<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VenBot | Starry AI Core</title>
    <style>
        :root { --sky: #0a0e1a; --moon: #f0f0f5; --accent: #df80ff; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--sky); color: var(--moon); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }

        .v-shield {
            margin-top: 30px; width: 70px; height: 80px; background: var(--moon);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(240, 240, 245, 0.3); z-index: 2;
        }
        .v-shield::after { content: "V"; font-size: 40px; font-weight: 900; color: var(--sky); }

        .cloud { position: fixed; background: rgba(255,255,255,0.05); filter: blur(30px); border-radius: 50%; z-index: 0; animation: drift 40s infinite linear; }
        @keyframes drift { from { transform: translateX(-110vw); } to { transform: translateX(110vw); } }

        #chat-container {
            width: 90%; max-width: 900px; height: 60vh; margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1); background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 20px;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 2;
        }

        .msg { padding: 12px 18px; border-radius: 18px; max-width: 80%; font-size: 14px; line-height: 1.5; }
        .bot { background: rgba(223, 128, 255, 0.2); border: 1px solid var(--accent); color: var(--moon); align-self: flex-start; }
        .user { background: rgba(255,255,255,0.1); align-self: flex-end; text-align: right; }

        .input-area { width: 90%; max-width: 900px; margin-top: 20px; display: flex; gap: 10px; z-index: 2; }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 15px; border-radius: 30px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        button { background: var(--moon); color: var(--sky); border: none; padding: 0 30px; font-weight: bold; cursor: pointer; border-radius: 30px; transition: 0.3s; }
        button:hover { background: var(--accent); transform: scale(1.05); }

        .nav-footer { margin-top: 30px; z-index: 2; }
        .page-link { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 12px; margin: 0 10px; border: 1px solid rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="cloud" style="width:400px; height:100px; top:20%;"></div>
    <div class="cloud" style="width:300px; height:80px; top:70%; animation-delay: -20s;"></div>

    <div class="v-shield"></div>
    <h1 style="font-weight: 300; letter-spacing: 5px; margin-top: 15px; z-index: 2;">STAR_LINK</h1>

    <div id="chat-container">
        <div class="msg bot">Uplink Stable. Gatekeep ts pls. <br>Type "Y2ab" to authenticate private mode.</div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Signal the AI..." onkeypress="if(event.key=='Enter') processMessage()">
        <button onclick="processMessage()">SEND</button>
    </div>

    <div class="nav-footer">
        <a href="page3.html" class="page-link">← GALAXY_GAMES</a>
        <a href="index.html" class="page-link">HOME</a>
    </div>

    <script>
        let isUnlocked = false;

        function addMsg(text, type) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function fetchAIResponse(userText) {
            try {
                const response = await fetch("https://duckduckgo-ai-chat.p.rapidapi.com", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        model: "gpt-4o-mini", 
                        messages: [{ role: "user", content: userText }] 
                    })
                });
                const data = await response.json();
                return data.choices.message.content;
            } catch (e) {
                return "The signal is blocked. Switch to a proxy.";
            }
        }

        async function processMessage() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            if(val === "/self_destruct") {
                window.location.replace("https://docs.google.com");
                return;
            }

            addMsg(val, 'user');
            input.value = "";

            if(val === "Y2ab") {
                isUnlocked = true;
                addMsg("<b>[SYSTEM]:</b> Authenticated. Unrestricted mode active.", "bot");
                return;
            }

            const aiReply = await fetchAIResponse(val);
            addMsg(`<b>AI:</b> ${aiReply}`, "bot");
        }

        window.addEventListener('keydown', e => { 
            if(e.key.toLowerCase() === 'q') window.location.replace("https://docs.google.com");
        });
    </script>
</body>
</html>
