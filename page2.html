<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emoji Hub | Movie & Anime Vault 🎬</title>
    <style>
        :root { 
            --main: #ffcc00; /* Classic Emoji Yellow */
            --bg: #ffffff; 
            --bubble: rgba(255, 204, 0, 0.1);
            --border: #e6b800;
        }
        
        body {
            background-color: var(--bg);
            color: #333;
            font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        header { 
            text-align: center; padding: 30px; width: 85%;
            background: var(--main); border-radius: 30px;
            border: 5px solid var(--border);
            margin-bottom: 30px; box-shadow: 0 10px 0 var(--border);
        }
        
        h1 { margin: 0; font-size: 35px; color: #000; letter-spacing: -1px; }
        .gatekeep { font-size: 12px; color: #666; margin-top: 10px; font-weight: bold; }

        .hub-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; width: 90%; max-width: 1300px; padding-bottom: 50px;
        }
        
        .button { 
            height: 110px; border-radius: 25px; border: 4px solid var(--border);
            background: var(--bg); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: #000; font-weight: bold; text-align: center;
            box-shadow: 0 6px 0 var(--border);
        }
        
        .button:hover { 
            background: var(--main); transform: scale(1.05) translateY(-5px); 
            box-shadow: 0 12px 0 var(--border); 
        }
        
        .emoji-icon { font-size: 30px; margin-bottom: 5px; }
        .desc { font-size: 10px; font-weight: normal; opacity: 0.7; margin-top: 5px; }

        .nav-footer { margin: 40px 0; display: flex; gap: 20px; }
        .page-link { 
            padding: 15px 30px; border-radius: 50px; border: 3px solid #000; 
            text-decoration: none; color: #000; font-weight: bold; 
            background: var(--main); transition: 0.2s;
        }
        .page-link:hover { background: #000; color: #fff; transform: rotate(-3deg); }

        /* Floating Decoration */
        .float-emoji { position: fixed; z-index: -1; opacity: 0.15; font-size: 50px; animation: float 10s infinite alternate ease-in-out; }
        @keyframes float { 0% { transform: translateY(0); } 100% { transform: translateY(-50px) rotate(20deg); } }
    </style>
</head>
<body>

    <!-- Floating Background Emojis -->
    <div class="float-emoji" style="top:10%; left:5%;">🎥</div>
    <div class="float-emoji" style="bottom:20%; right:10%; animation-delay: -2s;">🍿</div>
    <div class="float-emoji" style="top:50%; left:80%; animation-delay: -5s;">✨</div>

    <header>
        <h1>EMOJI_MEDIA_HUB 🎬🍿</h1>
        <div class="gatekeep">gatekeep ts pls 🤫✨ // V6 SOUL</div>
    </header>

    <div class="hub-container" id="mediaGrid">
        <!-- JS generates 50 Emoji Media Nodes -->
    </div>

    <div class="nav-footer">
        <a href="index.html" class="page-link">🏠 BACK_TO_HOME</a>
        <a href="page3.html" class="page-link">🎮 GO_TO_GAMES</a>
    </div>

    <script>
        const proxyGateway = "https://www.croxyproxy.com";
        
        const mediaSources = [
            { name: "HI_ANIME", url: "https://hianime.to", emoji: "🉐" },
            { name: "SOAP_2_DAY", url: "https://soap2day.rs", emoji: "🧼" },
            { name: "SFLIX_PRO", url: "https://sflix.to", emoji: "💎" },
            { name: "9_ANIME", url: "https://9animetv.to", emoji: "🦊" },
            { name: "FLIX_HQ", url: "https://flixhq.to", emoji: "📺" },
            { name: "MOVIES_JOY", url: "https://moviesjoy.to", emoji: "😄" },
            { name: "ZORO_X", url: "https://zoro.bz" , emoji: "⚔️" },
            { name: "F_MOVIES", url: "https://fmovies.to", emoji: "📁" }
        ];

        const grid = document.getElementById('mediaGrid');

        for (let i = 1; i <= 50; i++) {
            const data = mediaSources[(i - 1) % mediaSources.length];
            const btn = document.createElement('a');
            btn.className = "button";
            btn.target = "_blank";
            
            const encodedUrl = btoa(data.url);
            btn.href = `${proxyGateway}${encodedUrl}`;
            
            btn.innerHTML = `
                <div class="emoji-icon">${data.emoji}</div>
                <div>${data.name}_${i}</div>
                <span class="desc">Tap to Stream ⚡</span>
            `;
            grid.appendChild(btn);
        }

        // Panic Key
        window.addEventListener('keydown', e => { 
            if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); 
        });
    </script>
</body>
</html>
