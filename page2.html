<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VenHub | Golden Age 1999</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --deep-gold: #aa8811;
            --bg: #0a0a0a; 
            --glass: rgba(212, 175, 55, 0.05);
        }
        
        body {
            background-color: var(--bg);
            /* RETRO GRAIN PATTERN */
            background-image: url("https://www.transparenttextures.com");
            color: var(--gold);
            font-family: 'Georgia', serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* GOLDEN V-SHIELD */
        .header-logo {
            margin-top: 30px; position: relative; width: 90px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 0 15px var(--deep-gold));
        }
        .shield-icon {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--gold), var(--deep-gold));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .v-text { font-size: 60px; font-weight: 900; z-index: 2; color: #000; }

        header { 
            text-align: center; margin-bottom: 40px; padding: 30px; 
            border-bottom: 2px solid var(--gold); width: 85%; 
            background: rgba(0,0,0,0.8);
        }
        h1 { 
            font-size: 38px; letter-spacing: 5px; margin: 0; 
            text-transform: uppercase; font-weight: 900;
            text-shadow: 2px 2px 0px #000, 4px 4px 0px var(--deep-gold);
        }
        .subtitle { font-size: 12px; margin-top: 10px; letter-spacing: 3px; color: var(--gold); opacity: 0.8; }

        .container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 15px; width: 90%; max-width: 1300px; padding-bottom: 100px;
        }
        
        /* GOLDEN ERA BUTTONS */
        .button { 
            background: #000; border: 1px solid var(--gold); padding: 25px; 
            text-align: center; text-decoration: none; color: var(--gold);
            font-weight: bold; transition: 0.3s;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .button:hover { 
            background: var(--gold); color: #000;
            box-shadow: 0 0 30px var(--gold);
            transform: scale(1.05);
        }
        .desc { display: block; font-size: 10px; font-weight: normal; margin-top: 8px; opacity: 0.7; }

        .section-title { 
            width: 85%; margin: 30px 0 15px; font-size: 18px; 
            font-weight: 900; color: #000; background: var(--gold);
            padding: 5px 15px; letter-spacing: 2px;
        }

        /* FOOTER NAVIGATION */
        .nav-footer { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid var(--gold); padding: 15px; text-align: center; z-index: 100; }
        .back-link { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 14px; border: 1px solid var(--gold); padding: 8px 20px; transition: 0.3s; }
        .back-link:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="header-logo">
        <div class="shield-icon"></div>
        <div class="v-text">V</div>
    </div>

    <header>
        <h1>GOLDEN_AGE_1999</h1>
        <div class="subtitle">[ MEDIA_ARCHIVE // EST_2026 // gatekeep ts pls ]</div>
    </header>

    <div class="section-title">UNBLOCKED_ANIME_STREAMS</div>
    <div class="container" id="animeGrid">
        <!-- JS generates 25 Anime Nodes -->
    </div>

    <div class="section-title">UNBLOCKED_MOVIE_VAULT</div>
    <div class="container" id="movieGrid">
        <!-- JS generates 25 Movie Nodes -->
    </div>

    <div class="nav-footer">
        <a href="index.html" class="back-link">← RETURN_TO_MONOCHROME_HOME</a>
    </div>

    <script>
        const animeSites = [
            { name: "HI_ANIME", url: "https://hianime.to" },
            { name: "9_ANIME", url: "https://9animetv.to" },
            { name: "ANIWATCH", url: "https://aniwatchtv.to" },
            { name: "GOGO_ANIME", url: "https://gogoanime3.co" }
        ];

        const movieSites = [
            { name: "SFLIX_PRO", url: "https://sflix.to" },
            { name: "SOAP_2_DAY", url: "https://soap2day.rs" },
            { name: "FLIX_HQ", url: "https://flixhq.to" },
            { name: "MOVIES_JOY", url: "https://moviesjoy.to" }
        ];

        const animeGrid = document.getElementById('animeGrid');
        const movieGrid = document.getElementById('movieGrid');

        // Generate 25 Anime Buttons
        for (let i = 1; i <= 25; i++) {
            const data = animeSites[i % animeSites.length];
            animeGrid.innerHTML += `
                <a href="${data.url}" target="_blank" class="button">
                    ${data.name}_V${i}
                    <span class="desc">1999_PROTOCOL // UPLINK_${8000+i}</span>
                </a>
            `;
        }

        // Generate 25 Movie Buttons
        for (let i = 1; i <= 25; i++) {
            const data = movieSites[i % movieSites.length];
            movieGrid.innerHTML += `
                <a href="${data.url}" target="_blank" class="button">
                    ${data.name}_V${i}
                    <span class="desc">GOLDEN_VAULT // UPLINK_${9000+i}</span>
                </a>
            `;
        }

        // Panic Key Q
        window.addEventListener('keydown', e => { 
            if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); 
        });
    </script>
</body>
    </html>
