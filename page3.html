<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal V3 | 50_SOUL_NODES</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVU...">
    <style>
        :root { --neon: #00ff41; --bg: #000; --panel: rgba(0, 255, 65, 0.05); --warn: #ffeb3b; --danger: #ff4444; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        header { text-align: center; padding: 25px; border: 1px solid var(--neon); width: 85%; margin-top: 20px; background: rgba(0, 15, 0, 0.9); box-shadow: 0 0 15px var(--neon); }
        h1 { font-size: 38px; letter-spacing: 4px; text-shadow: 0 0 10px var(--neon); margin: 0; }
        .gatekeep { font-size: 10px; color: #fff; opacity: 0.6; margin-top: 8px; font-style: italic; }

        .hub-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 12px; width: 90%; max-width: 1400px; margin-top: 30px;
            overflow-y: auto; height: 60vh; padding: 20px; 
            border: 1px solid rgba(0, 255, 65, 0.3); background: rgba(0,0,0,0.7);
        }
        
        .button { 
            height: 100px; border: 1px solid var(--neon); background: var(--panel); 
            transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .node-link { text-decoration: none; color: var(--neon); font-weight: bold; text-align: center; width: 100%; height: 70%; display: flex; flex-direction: column; justify-content: center; }
        .button:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); transform: scale(1.03); }
        .button:hover .node-link { color: #000; }
        
        .report-btn { 
            width: 100%; height: 30%; background: rgba(255, 235, 59, 0.1); 
            border-top: 1px solid var(--neon); color: var(--warn); font-size: 9px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5;
        }
        .report-btn:hover { background: var(--danger); color: #fff; }
        
        .desc { font-size: 9px; display: block; margin-top: 4px; opacity: 0.8; font-weight: normal; }
        .ghosted { border-color: var(--danger) !important; color: var(--danger) !important; opacity: 0.5; }
        .ghosted .desc { color: var(--danger); }

        .nav-footer { margin: 25px 0; display: flex; gap: 20px; z-index: 10; }
        .page-link { padding: 12px 25px; border: 1px solid var(--neon); text-decoration: none; color: var(--neon); font-weight: bold; background: #000; transition: 0.3s; }
        .page-link:hover { background: var(--neon); color: #000; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <header>
        <h1>TERMINAL_V3: ELITE_GAMES</h1>
        <div class="gatekeep">gatekeep ts pls // 50_SOUL_NODES // March 2026</div>
    </header>

    <div class="hub-container" id="gameGrid"></div>

    <div class="nav-footer">
        <a href="page2.html" class="page-link"><- BACK_TO_HELL</a>
        <a href="page4.html" class="page-link">GO_TO_VENBOT -></a>
    </div>

    <script>
        const gameHubs = [
            { name: "NEBULA_X", url: "https://nebx.above.gay", status: "FLOURISHING" },
            { name: "INTERSTELLAR", url: "https://macarroll.com", status: "STABLE" },
            { name: "JACK_GAMES", url: "https://michuscrypt.github.io", status: "FRESH" },
            { name: "DOGE_UNBLOCK", url: "https://dogenetwork.org", status: "STABLE" },
            { name: "SZVY_CENTRAL", url: "https://github.com", status: "FRESH" },
            { name: "UNBLOCKED_64", url: "https://unblockedgames64.github.io", status: "STABLE" },
            { name: "ALGEBRA_ICU", url: "https://algebra.icu", status: "CLOAKED" },
            { name: "TOTALLY_SCIENCE", url: "https://totallyscience.co", status: "STABLE" },
            { name: "DUCK_MATH", url: "https://duckmath.org", status: "CLOAKED" },
            { name: "ASTRAL_V6", url: "https://astral.v6.rocks", status: "FLOURISHING" }
        ];

        const grid = document.getElementById('gameGrid');

        for (let i = 1; i <= 50; i++) {
            const hub = gameHubs[(i - 1) % gameHubs.length];
            const btnWrapper = document.createElement('div');
            btnWrapper.className = "button";
            btnWrapper.id = `node-${i}`;
            
            const googleMask = `https://www.google.com{encodeURIComponent(hub.url)}`;
            
            btnWrapper.innerHTML = `
                <a href="${googleMask}" target="_blank" class="node-link">
                    ${hub.name}_${i}
                    <span class="desc">STATUS: ${hub.status} // PORT: ${7000 + i}</span>
                </a>
                <div class="report-btn" onclick="reportGhosted(${i})">[REPORT_GHOSTED]</div>
            `;
            grid.appendChild(btnWrapper);
        }

        function reportGhosted(id) {
            const node = document.getElementById(`node-${id}`);
            node.classList.toggle('ghosted');
            const statusText = node.querySelector('.desc');
            statusText.innerText = node.classList.contains('ghosted') ? "STATUS: GHOSTED (BLOCKED)" : "STATUS: RESTORED";
        }

        // Matrix Logic
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01"; const fontSize = 16;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(letters[Math.floor(Math.random() * letters.length)], i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
        window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); });
    </script>
</body>
</html>
