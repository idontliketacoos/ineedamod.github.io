<!DOCTYPE html>
<html>
<head>
    <title>Terminal V3 | 999_GAMES</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVU...">
    
    <style type="text/css">
        body {
            background: #000; color: #00ff41; font-family: 'Courier New', monospace;
            margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center;
        }

        /* MATRIX CANVAS */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.25; }

        header { 
            text-align: center; padding: 25px; border: 1px solid #00ff41; width: 85%; 
            margin-top: 20px; background: rgba(0, 15, 0, 0.9); box-shadow: 0 0 15px #00ff41;
        }
        
        h1 { font-size: 38px; letter-spacing: 3px; text-shadow: 0 0 10px #00ff41; margin: 0; }
        .gatekeep { color: #fff; font-size: 10px; margin-top: 5px; font-style: italic; }
        
        /* SCROLLABLE HUB FOR 999 NODES */
        .hub-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 12px; width: 90%; max-width: 1400px; margin-top: 30px;
            overflow-y: auto; height: 65vh; padding: 20px; 
            border: 1px solid rgba(0, 255, 65, 0.3);
            background: rgba(0,0,0,0.6);
        }
        
        .button { 
            height: 85px; border: 1px solid #00ff41; background: rgba(0, 255, 65, 0.05); 
            transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-decoration: none; color: #00ff41; font-weight: bold; text-align: center;
        }
        .button:hover { background: #00ff41; box-shadow: 0 0 20px #00ff41; transform: scale(1.03); color: #000; }
        .desc { font-size: 9px; display: block; margin-top: 4px; opacity: 0.8; font-weight: normal; }

        /* Custom Scrollbar for the Matrix feel */
        .hub-container::-webkit-scrollbar { width: 5px; }
        .hub-container::-webkit-scrollbar-thumb { background: #00ff41; }

        .nav-footer { margin: 25px 0; display: flex; gap: 20px; z-index: 10; }
        .page-link { 
            padding: 12px 25px; border: 1px solid #00ff41; text-decoration: none; 
            color: #00ff41; font-weight: bold; background: #000; transition: 0.3s;
        }
        .page-link:hover { background: #00ff41; color: #000; box-shadow: 0 0 15px #00ff41; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <h1>TERMINAL_V3: GAME_OVERRIDE</h1>
        <p style="font-size: 12px;">[STATUS: 999 NODES ENCRYPTED // gatekeep ts pls]</p>
    </header>

    <div class="hub-container" id="gameGrid">
        <!-- 999 NODES INJECTED HERE -->
    </div>

    <div class="nav-footer">
        <a href="page2.html" class="page-link"><- Back to Hell</a>
        <a href="page4.html" class="page-link">GO TO PAGE 4: VENBOT? (X_X)</a>
    </div>

    <script>
        // Game Hub Data
        const gameHubs = [
            { name: "POKI_MIRROR", url: "https://poki.com" },
            { name: "CRAZY_GAMES_X", url: "https://crazygames.com" },
            { name: "HOODA_MATH_V3", url: "https://hoodamath.com" },
            { name: "UNBLOCKED_66", url: "https://sites.google.com" },
            { name: "TYRONE_GAMES", url: "https://tyronesgames.com" },
            { name: "COOLMATH_STEALTH", url: "https://coolmathgames.com" },
            { name: "ARMOR_ARCADE", url: "https://armorgames.com" }
        ];

        const grid = document.getElementById('gameGrid');

        // Inject 999 Nodes
        for (let i = 1; i <= 999; i++) {
            const hub = gameHubs[i % gameHubs.length];
            const btn = document.createElement('a');
            btn.className = "button";
            btn.target = "_blank";
            // Stealth routing: Using Google Redirector to mask referer
            btn.href = `https://www.google.com{encodeURIComponent(hub.url)}`;
            
            btn.innerHTML = `
                GAME_NODE_${i}
                <span class="desc">HUB: ${hub.name} // LATENCY: ${Math.floor(Math.random()*30)}ms</span>
            `;
            grid.appendChild(btn);
        }

        // Matrix Rain Logic
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "10";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 35);

        // Panic Key
        window.addEventListener('keydown', e => { if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); });
    </script>
</body>
</html>
