<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunar Hub | Page 3</title>
    <style>
        :root { 
            --sky: #0a0e1a; 
            --moon: #f0f0f5; 
            --cloud: rgba(255, 255, 255, 0.08); 
            --accent: #ffffff;
        }
        
        body {
            background-color: var(--sky);
            color: var(--moon);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* Moon Crest */
        .moon-crest {
            position: fixed; top: 40px; right: 60px;
            width: 80px; height: 80px;
            background: var(--moon);
            border-radius: 50%;
            box-shadow: -15px 5px 0 0 var(--sky), 0 0 25px rgba(240, 240, 245, 0.3);
            z-index: 1;
        }

        /* Drifting Clouds */
        .cloud {
            position: fixed; background: var(--cloud);
            filter: blur(35px); border-radius: 50%;
            z-index: 0; animation: drift 45s infinite linear;
        }
        @keyframes drift {
            from { transform: translateX(-110vw); }
            to { transform: translateX(110vw); }
        }

        header { 
            text-align: center; padding: 40px; width: 100%;
            z-index: 2; margin-bottom: 20px;
        }
        
        h1 { font-size: 34px; letter-spacing: 2px; font-weight: 300; text-transform: uppercase; }

        .hub-container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 25px; width: 90%; max-width: 1100px; z-index: 2;
        }

        .game-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; text-decoration: none; 
            color: var(--moon); text-align: center; 
            border-radius: 20px; transition: 0.4s;
            backdrop-filter: blur(5px);
        }
        
        .game-card:hover { 
            background: rgba(255, 255, 255, 0.1); 
            border-color: var(--accent);
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-footer { margin-top: 60px; display: flex; gap: 20px; z-index: 2; }
        .page-link { 
            padding: 12px 30px; border: 1px solid var(--moon); 
            text-decoration: none; color: var(--moon); font-size: 13px;
            border-radius: 30px; transition: 0.3s;
        }
        .page-link:hover { background: var(--moon); color: var(--sky); }
    </style>
</head>
<body>

    <div class="moon-crest"></div>
    <div class="cloud" style="width:350px; height:100px; top:15%; opacity: 0.5;"></div>
    <div class="cloud" style="width:280px; height:80px; top:60%; animation-delay: -15s; opacity: 0.3;"></div>

    <header>
        <h1>STARRY_UPLINK</h1>
    </header>

    <div class="hub-container">
        <!-- FUNCTIONAL 2026 NODES -->
        <a href="https://watermelon46.com" target="_blank" class="game-card">WATERMELON_46</a>
        <a href="https://twisted.surge.sh" target="_blank" class="game-card">TWISTED_SURGE</a>
        <a href="https://edpuzzle.cv" target="_blank" class="game-card">EDPUZZLE_CV</a>
    </div>

    <div class="nav-footer">
        <a href="page2.html" class="page-link">← MEDIA</a>
        <a href="index.html" class="page-link">HOME</a>
    </div>

    <script>
        window.addEventListener('keydown', e => { 
            if(e.key.toLowerCase() === 'q') window.location.replace('https://classroom.google.com'); 
        });
    </script>
</body>
</html>
